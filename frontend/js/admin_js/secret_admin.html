<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Secret</title>
    <style>
      body{font-family:Inter, system-ui, Arial, sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;background:#111;color:#fff;margin:0}
      .card{width:100%;max-width:400px;padding:32px;border-radius:12px;background:rgba(255,255,255,0.05);box-shadow:0 10px 40px rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.1)}
      h1{font-size:1.5rem;margin-bottom:1.5rem;text-align:center;color:#ff4d4d}
      .form-group{margin-bottom:1rem}
      label{display:block;margin-bottom:0.5rem;font-size:0.9rem;color:#ccc}
      input{width:100%;padding:10px;border-radius:6px;border:1px solid #333;background:#222;color:#fff;box-sizing:border-box;outline:none}
      input:focus{border-color:#ff4d4d}
      button{width:100%;padding:12px;margin-top:1rem;border:none;border-radius:6px;background:#ff4d4d;color:#fff;font-weight:bold;cursor:pointer;transition:background 0.2s}
      button:hover{background:#ff3333}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin-kirjautuminen</h1>
      
      <form action="#" method="POST">
        <div class="form-group">
          <label for="username">Käyttäjänimi</label>
          <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
          <label for="email">Sähköposti</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Puhelinnumero</label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
          <label for="password">Salasana</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Kirjaudu sisään</button>
      </form>
    </div>
  </body>
</html>
