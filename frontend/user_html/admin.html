<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login</title>

    <script type="module" src="../js/admin_js/admin.js"></script>

    <style>
      body {
        font-family: Inter, system-ui, Arial, sans-serif;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #111;
        color: #fff;
        margin: 0;
      }

      .card {
        width: 100%;
        max-width: 420px;
        padding: 32px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h1 {
        font-size: 1.6rem;
        margin-bottom: 1.5rem;
        text-align: center;
        color: #ff4d4d;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        color: #ccc;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #333;
        background: #222;
        color: #fff;
        outline: none;
      }

      input:focus {
        border-color: #ff4d4d;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 1rem;
        border: none;
        border-radius: 6px;
        background: #ff4d4d;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #ff3333;
      }

      .message {
        margin-top: 0.8rem;
        text-align: center;
        font-size: 0.9rem;
        color: #aaa;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Admin Login</h1>

      <form id="adminLoginForm">
        <div class="form-group">
          <label for="username">Käyttäjänimi</label>
          <input type="text" id="username" required />
        </div>

        <div class="form-group">
          <label for="email">Sähköposti</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="password">Salasana</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit">Kirjaudu</button>

        <div id="message" class="message"></div>
      </form>
    </div>
  </body>
</html>
