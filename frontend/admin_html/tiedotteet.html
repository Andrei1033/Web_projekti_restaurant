<!doctype html>
<html lang="fi">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>NightWolf Admin - Tiedotteet</title>
      <script src="../js/admin_js/tiedotteet.js" defer></script>
      <link rel="stylesheet" href="../css//admin_css/tiedotteet.css" />
   </head>
   <body>
      <header class="topbar">
         <div class="topbar-inner">
            <div class="brand">
               <h1>NightWolf Admin</h1>
               <p>Ravintolan hallintapaneeli</p>
            </div>
            <div class="userbox">
               <span>Kirjautunut ylläpitäjänä</span>
               <strong>Admin User</strong>
            </div>
         </div>
      </header>

      <nav class="nav">
         <div class="nav-inner">
            <a href="ruokalista.html">☰ Ruokalista</a>
            <a href="tilaukset.html">⬚ Tilaukset</a>
            <a href="tiedotteet.html" class="active">🔔 Tiedotteet</a>
         </div>
      </nav>

      <main class="container">
         <section class="panel">
            <h2>About — Muokkaa sisältöä</h2>
            <div class="field">
               <label for="concept">NIGHT WOLF CONCEPT</label>
               <textarea id="concept" rows="6"></textarea>
            </div>
            <div class="field">
               <label for="diets">Erityisruokavaliot</label>
               <textarea id="diets" rows="4"></textarea>
            </div>
            <div class="field">
               <label for="sustainability">Vastuullisuus</label>
               <textarea id="sustainability" rows="4"></textarea>
            </div>
            <div class="field">
               <label for="openingHours">OPENING HOURS (yksi rivi per merkintä, esim. Mon – Fri|10:00 – 22:00)</label>
               <textarea id="openingHours" rows="4"></textarea>
            </div>
            <div class="field">
               <label for="capacity">Istumapaikkojen määrä (Capacity)</label>
               <input id="capacity" type="number" min="0" placeholder="Esim. 80" />
            </div>
            <button id="save-about" class="btn">Tallenna About</button>
         </section>

         <section class="panel">
            <h2>Tiedotteet</h2>
            <div id="announcements-list"></div>
            <div class="field">
               <label for="new-title">Uusi tiedote - Otsikko</label>
               <input id="new-title" type="text" />
            </div>
            <div class="field">
               <label for="new-body">Sisältö</label>
               <textarea id="new-body" rows="3"></textarea>
            </div>
            <button id="add-announcement" class="btn">Lisää tiedote</button>
            <button id="save-announcements" class="btn">Tallenna tiedotteet</button>
         </section>

      </main>
   </body>
</html>
