<!doctype html>
<html lang="fi">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>NightWolf Admin - Tilaukset</title>
      <script src="../js/admin_js/tilaukset.js" defer></script>
      <link rel="stylesheet" href="../css/admin_css/ruokalista.css" />
      <link rel="stylesheet" href="../css/admin_css/tilaukset.css" />
   </head>
   <body>
      <header class="topbar">
         <div class="topbar-inner">
            <div class="brand">
               <h1>NightWolf Admin</h1>
               <p>Ravintolan hallintapaneeli</p>
            </div>
            <div class="userbox">
               <span>Kirjautunut ylläpitäjänä</span>
               <strong>Admin User</strong>
            </div>
         </div>
      </header>

      <nav class="nav">
         <div class="nav-inner">
            <a href="ruokalista.html">☰ Ruokalista</a>
            <a href="tilaukset.html" class="active">⬚ Tilaukset</a>
            <a href="tiedotteet.html">🔔 Tiedotteet</a>
         </div>
      </nav>

      <main class="container">
         <section class="page-head">
            <div>
               <h2>Tilausten hallinta</h2>
               <p>Seuraa ja hallinnoi asiakkaiden tilauksia</p>
            </div>
            <div class="header-actions">
               <button id="refresh-btn" class="secondary-btn">🔄 Päivitä</button>
               <a href="../user_html/index.html" class="primary-btn" target="_blank">+ Uusi tilaus</a>
            </div>
         </section>

         <!-- Suodatinpalkki -->
         <div class="filter-bar">
            <div class="filter-group">
               <button id="filter-btn" class="filter-btn">📊 Suodata: Kaikki tilaukset ▼</button>
               <div id="filter-dropdown" class="filter-dropdown">
                  <div class="filter-option" data-status="all">Kaikki tilaukset</div>
                  <div class="filter-option" data-status="upcoming">Vain tulevat tilaukset</div>
               </div>
            </div>
            <div class="stats"></div>
         </div>

         <!-- Tilauskorttien grid -->
         <div class="orders-grid"></div>

         <!-- Sivutus -->
         <div class="pagination">
            <button id="prev-page" class="page-btn">◀ Edellinen</button>
            <span id="page-info" class="page-info">Sivu 1 / 1</span>
            <button id="next-page" class="page-btn">Seuraava ▶</button>
         </div>
      </main>

      <!-- Modaali tilauksen näyttämistä ja muokkausta varten -->
      <div id="orderModal" class="modal">
         <div class="modal-content">
            <div class="modal-header">
               <h3 id="modal-title">Tilauksen tiedot</h3>
               <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body" id="modal-body">
               <!-- Sisältö ladataan dynaamisesti -->
            </div>
         </div>
      </div>
   </body>
</html>
