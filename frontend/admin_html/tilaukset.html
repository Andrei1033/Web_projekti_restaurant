<!doctype html>
<html lang="fi">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>NightWolf Admin - Tilaukset</title>
      <script src="../js/admin.js" defer></script>
      <link rel="stylesheet" href="../css/admin_css/style.css" />
   </head>
   <body>
      <header class="topbar">
         <div class="topbar-inner">
            <div class="brand">
               <h1>NightWolf Admin</h1>
               <p>Ravintolan hallintapaneeli</p>
            </div>
            <div class="userbox">
               <span>Kirjautunut ylläpitäjänä</span>
               <strong>Admin User</strong>
            </div>
         </div>
      </header>

      <nav class="nav">
         <div class="nav-inner">
            <a href="ruokalista.html">☰ Ruokalista</a>
            <a href="tilaukset.html" class="active">⬚ Tilaukset</a>
            <a href="tiedotteet.html">🔔 Tiedotteet</a>
         </div>
      </nav>

      <main class="container">
         <section class="page-head">
            <div>
               <h2>Tilausten hallinta</h2>
               <p>Seuraa ja hallinnoi asiakkaiden tilauksia</p>
            </div>
            <button class="primary-btn" onclick="openModal('orderModal')">+ Uusi tilaus</button>
         </section>

         <div class="orders-grid">
            <section class="card order">
               <div class="order-top"></div>
               <div class="order-items"></div>
            </section>

            <!-- TILAUS MODAL -->
            <div id="orderModal" class="modal">
               <div class="modal-content wide">
                  <h2>Lisää uusi tilaus</h2>

                  <div class="form-grid">
                     <div>
                        <label>Asiakkaan nimi *</label>
                        <input type="text" placeholder="Esim. Matti Meikäläinen" />
                     </div>

                     <div>
                        <label>Sähköposti *</label>
                        <input type="email" placeholder="esimerkki@email.com" />
                     </div>

                     <div class="full">
                        <label>Tilatut tuotteet *</label>
                        <div class="order-row">
                           <input type="text" placeholder="Tuotteen nimi" />
                           <input type="number" value="1" class="qty" />
                           <input type="number" value="0" class="price" />
                        </div>

                        <button class="add-item">+ Lisää tuote</button>
                     </div>

                     <div class="full">
                        <label>Huomiot (valinnainen)</label>
                        <textarea placeholder="Esim. Extra sipulia kiitos!"></textarea>
                     </div>

                     <div class="full total-box">
                        <span>Yhteensä:</span>
                        <strong id="orderTotal">0.00€</strong>
                     </div>
                  </div>

                  <div class="modal-actions">
                     <button class="primary-btn" onclick="saveOrder()">💾 Tallenna tilaus</button>
                     <button onclick="closeModal('orderModal')">Peruuta</button>
                  </div>
               </div>
            </div>
         </div>
      </main>
   </body>
</html>
